<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SubZeroSec — Constellation Journey (full page)</title>
<link rel="icon" href="./logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     SubZeroSec · CONSTELLATION JOURNEY
     The WHOLE page is one flight through the graph. A camera glides
     across a single starry constellation, stopping at "stations".
     Each station is a section whose content cross-fades in while the
     camera zooms a cluster/node — a different variation per station:
       hero=wide overview · capabilities=node-by-node zoom ·
       stats=cluster pull-back · approach=hub+satellites ·
       testimonials=lateral pan · cta=deep core zoom · footer=zoom-out.
     ============================================================ */
  :root{
    --bg:#070D1B; --fg:#EAF1FF; --muted:#A9B7CE; --faint:#73839B;
    --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.16);
    --accent:#5A8CD8; --fill:#2759A5; --deep:#132D53; --soft:rgba(90,140,216,.18);
    --ease:cubic-bezier(.22,1,.36,1); --maxw:1180px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  @media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
  body{background:var(--bg);color:var(--muted);font-family:"Inter",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--accent);color:#06101f}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  h1,h2,h3,h4{font-family:"Inter";font-weight:800;letter-spacing:-.02em;line-height:1.12;color:var(--fg)}
  .eyebrow{font-size:.74rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
  .btn{display:inline-flex;align-items:center;gap:.5em;font-weight:600;font-size:.92rem;padding:.875rem 2.1rem;border-radius:7px;cursor:pointer;transition:.2s var(--ease)}
  .btn-out{background:transparent;color:var(--fg);box-shadow:inset 0 0 0 1.5px var(--line-2)}
  .btn-out:hover{box-shadow:inset 0 0 0 1.5px var(--accent);color:var(--accent)}
  .txtsh{text-shadow:0 2px 30px rgba(7,13,27,.85),0 1px 3px rgba(7,13,27,.9)}

  #sky{position:fixed;inset:0;z-index:0;display:block;pointer-events:none}
  .veil{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(120% 90% at 50% 30%,transparent 45%,rgba(7,13,27,.5) 100%)}

  /* shiny CTA */
  @property --ga{syntax:"<angle>";initial-value:0deg;inherits:false}
  .shiny{position:relative;isolation:isolate;overflow:hidden;cursor:pointer;border:1px solid transparent;border-radius:9px;
    padding:.95rem 2.1rem;font:600 .95rem "Inter";color:#fff;
    background:linear-gradient(var(--fill),var(--fill)) padding-box,
      conic-gradient(from var(--ga),transparent,var(--accent) 8%,#cfe0ff 14%,var(--accent) 20%,transparent 28%) border-box;
    box-shadow:0 14px 30px -12px rgba(39,89,165,.7);animation:spin 4s linear infinite}
  .shiny::after{content:"";position:absolute;inset:0;z-index:-1;border-radius:inherit;background:linear-gradient(-50deg,transparent,rgba(207,224,255,.5),transparent);mask:radial-gradient(circle at bottom,transparent 42%,#000);opacity:.5;animation:spin 6s linear infinite reverse}
  @keyframes spin{to{--ga:360deg}}
  @media(prefers-reduced-motion:reduce){.shiny,.shiny::after{animation:none}}

  /* header + underline navbar */
  header{position:fixed;top:0;left:0;right:0;z-index:80;background:rgba(7,12,24,.5);backdrop-filter:saturate(150%) blur(14px);border-bottom:1px solid rgba(255,255,255,.07);transition:background .3s var(--ease)}
  header.scrolled{background:rgba(6,11,22,.9);box-shadow:0 14px 36px -18px rgba(0,0,0,.7)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:70px;gap:20px;max-width:var(--maxw);margin:0 auto;padding:0 clamp(20px,4vw,40px)}
  .brand{display:flex;align-items:center;gap:.55rem;font-weight:800;font-size:1.08rem;color:#fff}
  .brand img{width:26px;height:26px}.brand .z{color:var(--accent)}
  .nav-links{position:relative;display:flex;align-items:center;gap:.4rem}
  .nav-links a{position:relative;font-size:.88rem;font-weight:500;color:#C4CEDE;padding:.5rem .7rem;transition:color .2s;cursor:pointer}
  .nav-links a:hover{color:#fff}
  .nav-links .uline{position:absolute;bottom:.34rem;height:2px;border-radius:2px;background:var(--accent);box-shadow:0 0 8px rgba(90,140,216,.8);opacity:0;transition:left .3s var(--ease),width .3s var(--ease),opacity .25s;pointer-events:none}
  .nav-end{display:flex;align-items:center;gap:1rem}
  .nav-end .login{font-size:.86rem;font-weight:500;color:var(--fg)}
  .nav-cta{font:600 .86rem "Inter";color:#fff;background:var(--fill);padding:.55rem 1.1rem;border-radius:7px;transition:.2s;cursor:pointer}
  .nav-cta:hover{background:var(--deep)}
  @media(max-width:980px){.nav-links{display:none}.nav-end .login{display:none}}

  /* JOURNEY: tall track + sticky stage holding cross-fading stations */
  .journey{position:relative;z-index:2}
  .stage{position:sticky;top:0;height:100vh;overflow:hidden}
  .station{position:absolute;inset:0;display:flex;opacity:0;pointer-events:none;padding:84px clamp(20px,5vw,60px) 40px;will-change:opacity}
  .station .inner{width:100%;max-width:var(--maxw);margin:0 auto}
  .station.center{align-items:center;justify-content:center;text-align:center}
  .station.left{align-items:center;justify-content:flex-start;text-align:left}
  .station.lower{align-items:flex-end;justify-content:center;text-align:center;padding-bottom:11vh}
  .station.bottom{align-items:flex-end;justify-content:center}

  .station h1{font-size:clamp(2.5rem,5.6vw,4rem);color:#fff;line-height:1.06;letter-spacing:-.025em}
  .station h1 .r{color:var(--accent)}
  .station .sub{margin-top:1.2rem;font-size:1.08rem;max-width:50ch;color:#cdd8ea}
  .left .sub{margin-left:0}.center .sub,.lower .sub{margin-left:auto;margin-right:auto}
  .station .row{margin-top:1.9rem;display:flex;gap:.8rem;flex-wrap:wrap;align-items:center}
  .center .row,.lower .row{justify-content:center}
  .hint{margin-top:2.2rem;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);display:flex;align-items:center;gap:.6rem}
  .center .hint,.lower .hint{justify-content:center}
  .hint .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(90,140,216,.18);animation:blip 2s ease-in-out infinite}
  @keyframes blip{0%,100%{opacity:.4}50%{opacity:1}}
  .station h2{font-size:clamp(1.9rem,4vw,2.8rem)}
  .station .lead-eye{margin-bottom:.5rem}

  /* glass node-card (capabilities / testimonial) */
  .glass{background:linear-gradient(165deg,rgba(20,34,63,.8),rgba(10,18,38,.84));backdrop-filter:blur(9px);border:1px solid var(--line-2);border-radius:16px;padding:26px 28px;max-width:460px;margin:0 auto;box-shadow:0 28px 64px -28px rgba(0,0,0,.8)}
  .glass .step{font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
  .glass h3{font-size:1.4rem;color:#fff;margin:.4rem 0 .5rem}
  .glass p{font-size:.95rem;color:var(--muted)}
  .glass .chips{margin-top:1rem;display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
  .glass .chip{font-size:.7rem;font-weight:600;color:var(--accent);background:var(--soft);border:1px solid rgba(90,140,216,.25);padding:.2rem .55rem;border-radius:999px}

  /* stats */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;max-width:920px;margin:1.6rem auto 0}
  .stat .v{font-weight:800;font-size:clamp(2.4rem,4.6vw,3.6rem);color:#fff;letter-spacing:-.035em;line-height:1;font-variant-numeric:tabular-nums}
  .stat .v .s{color:var(--accent)}
  .stat .l{margin-top:.5rem;font-size:.84rem;color:var(--muted)}
  @media(max-width:680px){.stats{grid-template-columns:1fr 1fr;gap:28px 12px}}

  /* approach steps */
  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:880px;margin:1.8rem auto 0;text-align:left}
  .stp{position:relative;background:rgba(13,23,46,.62);border:1px solid var(--line);border-radius:14px;padding:24px;backdrop-filter:blur(6px)}
  .stp::before{content:"";position:absolute;left:0;top:0;height:2px;width:34px;background:var(--accent);box-shadow:0 0 12px rgba(90,140,216,.7)}
  .stp .no{font-size:2rem;font-weight:800;color:rgba(90,140,216,.34);line-height:1}
  .stp h4{color:#fff;font-size:1.04rem;margin:.5rem 0 .3rem}
  .stp p{font-size:.86rem;color:var(--muted)}
  @media(max-width:760px){.steps{grid-template-columns:1fr;max-width:420px}}

  /* testimonial */
  .quote{max-width:620px;margin:0 auto}
  .quote .stars{color:var(--accent);letter-spacing:.18em;margin-bottom:.7rem}
  .quote blockquote{font-size:clamp(1.2rem,2.4vw,1.6rem);color:#fff;font-weight:600;letter-spacing:-.01em;line-height:1.4}
  .quote .who{margin-top:1.2rem;font-size:.86rem;color:var(--muted)}
  .quote .who b{color:#fff}

  /* footer */
  .fgrid{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:32px;text-align:left;width:100%}
  .fgrid .about p{font-size:.88rem;color:#9aa8bf;margin-top:1rem;max-width:30ch}
  .fcol h4{font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fff;margin-bottom:1rem}
  .fcol a{display:block;font-size:.88rem;color:#9aa8bf;padding:.3rem 0;transition:color .2s}.fcol a:hover{color:var(--accent)}
  .fbar{margin-top:30px;padding-top:20px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;font-size:.8rem;color:var(--faint);width:100%}
  .ftr .inner{width:100%}
  @media(max-width:760px){.fgrid{grid-template-columns:1fr 1fr}}

  /* progress rail */
  .rail{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:60;display:flex;flex-direction:column;gap:10px}
  .rail i{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);transition:.3s;cursor:pointer}
  .rail i.on{background:var(--accent);box-shadow:0 0 10px rgba(90,140,216,.9);transform:scale(1.25)}
  @media(max-width:880px){.rail{display:none}}
  .badge{position:fixed;left:14px;bottom:14px;z-index:90;font-size:.62rem;font-weight:700;letter-spacing:.1em;color:#fff;background:var(--fill);padding:6px 10px;border-radius:6px}

  /* mobile fallback: stations stack and just show normally */
  @media(max-width:880px){
    .journey{height:auto!important}
    .stage{position:static;height:auto}
    .station{position:relative;inset:auto;opacity:1!important;pointer-events:auto;min-height:auto;padding:60px 20px}
    .station.lower,.station.bottom{align-items:center}
  }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="veil"></div>
<div class="badge">JOURNEY · the whole page flies the graph</div>
<div class="rail" id="rail"></div>

<header>
  <div class="nav">
    <a class="brand" href="#"><img src="./logo.png" alt="SubZeroSec logo" />SubZero<span class="z">Sec</span></a>
    <nav class="nav-links" id="navlinks"><span class="uline"></span>
      <a class="active" data-go="0">Home</a><a data-go="1">Capabilities</a><a data-go="7">Proof</a><a data-go="8">Approach</a><a data-go="10">Contact</a>
    </nav>
    <div class="nav-end"><a class="login">Login</a><a class="nav-cta" data-go="10">Get a Free Consultation</a></div>
  </div>
</header>

<div class="journey" id="journey">
  <div class="stage" id="stage"><!-- stations injected here --></div>
</div>

<script>
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ---------- station definitions (content + camera) ----------
     cam:[worldX, worldY], sc: scale key, ay: anchorY (where the focus sits vertically) */
  var CAP=[
    {t:"Penetration Testing",d:"Web, API, network, cloud and mobile — every vulnerability confirmed by hand and proven with a working exploit path.",c:["Web · API","Cloud","Internal"]},
    {t:"Red Teaming",d:"Intelligence-led adversary emulation that tests whether your people, process and detection actually stop a real intrusion.",c:["TTP-led","Assumed breach"]},
    {t:"Threat Hunting",d:"Assume-breach hunting that surfaces threats already inside your environment before they escalate to an incident.",c:["Telemetry","IOC"]},
    {t:"OSINT & Recon",d:"Discover exposed assets, leaked credentials and the intelligence an adversary gathers before ever touching you.",c:["Exposure","Footprint"]},
    {t:"Attack-Surface",d:"Continuous visibility of everything reachable from the outside — mapped, prioritised and tracked the way an attacker sees it.",c:["External","Ranked"]},
    {t:"Compliance Testing",d:"Targeted assessments mapped to ISO 27001, SOC 2 and PCI DSS — with the evidence auditors and regulators expect.",c:["ISO 27001","SOC 2","PCI DSS"]}
  ];
  function capHTML(i){var x=CAP[i];return '<div class="inner"><div class="glass"><div class="step">Node 0'+(i+1)+' / 06 · Capability</div><h3>'+x.t+'</h3><p>'+x.d+'</p><div class="chips">'+x.c.map(function(s){return '<span class="chip">'+s+'</span>';}).join('')+'</div></div></div>';}

  var STATIONS=[
    {align:'left',  sc:'over', cam:[1150,640], ay:.5, focus:[], html:
      '<div class="inner"><span class="eyebrow txtsh">Offensive Security · Attack-Surface Intelligence</span>'+
      '<h1 class="txtsh">We map the graph an<br>attacker would <span class="r">walk.</span></h1>'+
      '<p class="sub txtsh">SubZeroSec models your environment as a living attack graph — every host, identity and trust relationship a node — then proves the path an adversary takes before they ever find it.</p>'+
      '<div class="row"><a class="shiny" data-go="10">Get a Free Consultation →</a><a class="btn btn-out" data-go="1">Fly the graph</a></div>'+
      '<div class="hint"><span class="dot"></span> Scroll — the whole page flies the constellation</div></div>'},
    {align:'lower', sc:'zoom', cam:[360,420], ay:.34, focus:[0], html:capHTML(0)},
    {align:'lower', sc:'zoom', cam:[560,300], ay:.34, focus:[1], html:capHTML(1)},
    {align:'lower', sc:'zoom', cam:[300,650], ay:.34, focus:[2], html:capHTML(2)},
    {align:'lower', sc:'zoom', cam:[640,560], ay:.34, focus:[3], html:capHTML(3)},
    {align:'lower', sc:'zoom', cam:[840,400], ay:.34, focus:[4], html:capHTML(4)},
    {align:'lower', sc:'zoom', cam:[520,820], ay:.34, focus:[5], html:capHTML(5)},
    {align:'center',sc:'mid',  cam:[1600,400], ay:.5, focus:[6,7,8,9], html:
      '<div class="inner"><span class="eyebrow lead-eye txtsh">Proof, not noise</span><h2 class="txtsh">Measured in outcomes.</h2>'+
      '<div class="stats">'+
      '<div class="stat"><div class="v"><span class="num" data-to="340">0</span><span class="s">+</span></div><div class="l">Assessments delivered</div></div>'+
      '<div class="stat"><div class="v"><span class="num" data-to="127">0</span><span class="s">+</span></div><div class="l">Critical findings proven</div></div>'+
      '<div class="stat"><div class="v"><span class="num" data-to="98">0</span><span class="s">%</span></div><div class="l">Remediation verified</div></div>'+
      '<div class="stat"><div class="v"><span class="num" data-to="15">0</span><span class="s">+</span></div><div class="l">Industries secured</div></div></div></div>'},
    {align:'center',sc:'mid',  cam:[760,1080], ay:.5, focus:[10,11,12,13], html:
      '<div class="inner"><span class="eyebrow lead-eye txtsh">How we work</span><h2 class="txtsh">Three moves, every engagement.</h2>'+
      '<div class="steps">'+
      '<div class="stp"><div class="no">01</div><h4>Map</h4><p>We enumerate the real attack surface and build the graph an adversary would.</p></div>'+
      '<div class="stp"><div class="no">02</div><h4>Prove</h4><p>We walk the path by hand and prove every finding with a working exploit.</p></div>'+
      '<div class="stp"><div class="no">03</div><h4>Verify</h4><p>We rank by impact, support the fix, and re-test until it holds.</p></div></div></div>'},
    {align:'lower', sc:'mid',  cam:[1930,330], ay:.42, focus:[14,15], html:
      '<div class="inner"><div class="quote glass" style="max-width:620px"><div class="stars">★★★★★</div>'+
      '<blockquote>"They showed us exactly how an attacker would move through us — then stayed until our own team could see it happening."</blockquote>'+
      '<div class="who"><b>Director of Security Ops</b> · Global Retail Bank</div></div></div>'},
    {align:'center',sc:'deep', cam:[2160,920], ay:.5, focus:[16], html:
      '<div class="inner"><span class="eyebrow lead-eye txtsh">Get ahead of zero</span>'+
      '<h2 class="txtsh">Ready to see your <span class="r">attack graph?</span></h2>'+
      '<p class="sub txtsh" style="margin-top:1rem">Book a scoped assessment — we\'ll map what\'s reachable, prove what\'s exploitable, and rank the path to closing it before someone finds it first.</p>'+
      '<div class="row"><a class="shiny">Book a free pentest scoping call →</a></div></div>'},
    {align:'bottom',sc:'out',  cam:[1150,640], ay:.5, focus:[], cls:'ftr', html:
      '<div class="inner"><div class="fgrid">'+
      '<div class="about"><a class="brand"><img src="./logo.png" alt="" />SubZero<span class="z">Sec</span></a><p>Offensive security that finds exploitable weaknesses before adversaries do. Before Zero. Beyond Breach.</p></div>'+
      '<div class="fcol"><h4>Services</h4><a>Penetration Testing</a><a>Red Teaming</a><a>Threat Hunting</a><a>OSINT</a><a>Attack-Surface</a></div>'+
      '<div class="fcol"><h4>Company</h4><a>About</a><a>Team</a><a>Careers</a><a>Case Studies</a></div>'+
      '<div class="fcol"><h4>Contact</h4><a>hello@subzerosec.com</a><a>LinkedIn</a><a>X</a><a>GitHub</a></div></div>'+
      '<div class="fbar"><span>© 2026 SubZeroSec (Pvt) Ltd. — Islamabad, Pakistan</span><span>Privacy · Terms · Trust &amp; Compliance</span></div></div>'}
  ];

  /* build station DOM + nav rail */
  var stage=document.getElementById('stage'), rail=document.getElementById('rail');
  STATIONS.forEach(function(s,i){
    var d=document.createElement('section'); d.className='station '+s.align+(s.cls?(' '+s.cls):''); d.innerHTML=s.html; d.dataset.i=i;
    stage.appendChild(d); s.el=d;
    var r=document.createElement('i'); r.dataset.go=i; rail.appendChild(r);
  });
  var railDots=[].slice.call(rail.children);
  var N=STATIONS.length, STEP=0.84;            // each station ≈ 0.84 viewport of scroll
  var journey=document.getElementById('journey');
  function layout(){ journey.style.height=((N-1)*STEP*100+100)+'vh'; }
  layout(); addEventListener('resize',layout);

  /* smooth scroll to a station (nav + rail) */
  function goTo(i){ var top=journey.offsetTop + i*STEP*innerHeight; scrollTo({top:top,behavior:'smooth'}); }
  document.addEventListener('click',function(e){ var g=e.target.closest('[data-go]'); if(g){ e.preventDefault(); goTo(+g.dataset.go); }});

  /* underline navbar */
  (function(){
    var box=document.getElementById('navlinks'), u=box.querySelector('.uline'), links=[].slice.call(box.querySelectorAll('a'));
    function move(el){var b=box.getBoundingClientRect(),r=el.getBoundingClientRect();u.style.left=(r.left-b.left)+'px';u.style.width=r.width+'px';u.style.opacity=1;}
    function rest(){var a=box.querySelector('a.active')||links[0];if(a)move(a);}
    links.forEach(function(a){a.addEventListener('mouseenter',function(){move(a);});});
    box.addEventListener('mouseleave',rest);addEventListener('resize',rest);rest();
  })();
  var hdr=document.querySelector('header');

  /* ---------- constellation + travelling camera ---------- */
  (function(){
    var c=document.getElementById('sky'), x=c.getContext('2d'), W,H,DPR=Math.min(devicePixelRatio||1,2);
    var WW=2500, WH=1500, stars=[];
    // destination feature nodes (world coords); stations focus these by index
    var FP=[[360,420],[560,300],[300,650],[640,560],[840,400],[520,820],   // 0-5 capabilities
            [1500,320],[1660,430],[1560,560],[1720,300],                     // 6-9 stats cluster
            [760,1080],[630,980],[900,1010],[780,1210],                      // 10-13 approach hub+sats
            [1840,250],[2030,420],                                           // 14-15 testimonials
            [2160,920]];                                                     // 16 cta core
    var EDGES=[[0,1],[0,2],[1,3],[2,3],[3,4],[2,5],[3,5],[4,6],
               [6,7],[7,8],[6,9],[7,9],[8,9],[5,10],[10,11],[10,12],[10,13],[12,13],
               [9,14],[14,15],[15,16],[8,16]];
    var feat=FP.map(function(p){return {x:p[0],y:p[1],glow:0};});
    function build(){ stars=[]; var n=140; for(var i=0;i<n;i++) stars.push({x:Math.random()*WW,y:Math.random()*WH,r:Math.random()*1.4+0.5,ph:Math.random()*6.28,sp:Math.random()*1.2+0.4,vx:(Math.random()-.5)*0.05,vy:(Math.random()-.5)*0.05}); }
    function size(){ W=c.width=innerWidth*DPR; H=c.height=innerHeight*DPR; c.style.width=innerWidth+'px'; c.style.height=innerHeight+'px'; recompute(); }
    build();

    var SC; function recompute(){ var FIT=Math.min(W/WW,H/WH); SC={over:FIT*0.82,zoom:FIT*3.1,mid:FIT*1.85,deep:FIT*3.7,out:FIT*0.96};
      STATIONS.forEach(function(s){ var sc=SC[s.sc]; s._s=sc; s._x=s.cam[0]; s._y=s.cam[1] + (0.5 - s.ay)*H/sc; }); }
    size(); addEventListener('resize',function(){size();onScroll();});

    var cam={x:1150,y:640,s:0.4}, tgt={x:1150,y:640,s:0.4}, activeF=0;
    function lerp(a,b,t){return a+(b-a)*t;}
    function proj(wx,wy){return [(wx-cam.x)*cam.s+W/2,(wy-cam.y)*cam.s+H/2];}

    var counted=false;
    function onScroll(){
      var top=journey.offsetTop, stepPx=STEP*innerHeight;
      var f=Math.min(Math.max((scrollY-top)/stepPx,0),N-1); activeF=f;
      var i0=Math.floor(f), i1=Math.min(i0+1,N-1), fr=f-i0, fe=fr*fr*(3-2*fr);
      var s0=STATIONS[i0], s1=STATIONS[i1];
      tgt.x=lerp(s0._x,s1._x,fe); tgt.y=lerp(s0._y,s1._y,fe); tgt.s=lerp(s0._s,s1._s,fe);
      // content cross-fade
      STATIONS.forEach(function(s,i){ var op=Math.max(0,Math.min(1.25-2.1*Math.abs(f-i),1)); s.el.style.opacity=op; s.el.style.pointerEvents=op>0.6?'auto':'none'; });
      // rail + nav active
      var near=Math.round(f); railDots.forEach(function(d,k){d.classList.toggle('on',k===near);});
      hdr.classList.toggle('scrolled',scrollY>24);
      // counters when proof station reached
      if(!counted && Math.abs(f-7)<0.6){ counted=true; document.querySelectorAll('.num').forEach(function(el){ var to=+el.getAttribute('data-to'),t0=null; if(reduce){el.textContent=to;return;} function st(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/1600,1);el.textContent=Math.round(to*(1-Math.pow(1-p,3)));if(p<1)requestAnimationFrame(st);} requestAnimationFrame(st); }); }
    }
    addEventListener('scroll',onScroll,{passive:true});

    var t0=performance.now();
    function frame(now){
      var t=(now-t0)/1000;
      cam.x=lerp(cam.x,tgt.x,0.08); cam.y=lerp(cam.y,tgt.y,0.08); cam.s=lerp(cam.s,tgt.s,0.08);
      var nf=Math.round(activeF), focus=STATIONS[nf]?STATIONS[nf].focus:[];
      for(var i=0;i<feat.length;i++){ feat[i].glow=lerp(feat[i].glow, focus.indexOf(i)>=0?1:0, 0.1); }

      x.clearRect(0,0,W,H);
      var MAX=120*DPR;
      for(var a=0;a<stars.length;a++){ var s=stars[a]; s.x+=s.vx; s.y+=s.vy; if(s.x<0||s.x>WW)s.vx*=-1; if(s.y<0||s.y>WH)s.vy*=-1;
        var pa=proj(s.x,s.y);
        for(var b=a+1;b<stars.length;b++){ var q=stars[b],dx=(s.x-q.x)*cam.s,dy=(s.y-q.y)*cam.s,d=Math.sqrt(dx*dx+dy*dy);
          if(d<MAX){ var pb=proj(q.x,q.y); x.strokeStyle='rgba(90,140,216,'+(1-d/MAX)*0.2+')'; x.lineWidth=DPR*0.5; x.beginPath(); x.moveTo(pa[0],pa[1]); x.lineTo(pb[0],pb[1]); x.stroke(); } }
        var tw=0.55+0.45*Math.sin(t*s.sp+s.ph); x.beginPath(); x.fillStyle='rgba(150,185,235,'+tw*0.85+')'; x.arc(pa[0],pa[1],s.r*DPR,0,6.283); x.fill();
      }
      // feature edges
      for(var e=0;e<EDGES.length;e++){ var n1=feat[EDGES[e][0]],n2=feat[EDGES[e][1]],g=Math.max(n1.glow,n2.glow),p1=proj(n1.x,n1.y),p2=proj(n2.x,n2.y);
        x.strokeStyle='rgba(90,140,216,'+(0.12+g*0.5)+')'; x.lineWidth=DPR*(0.6+g*0.9); x.beginPath(); x.moveTo(p1[0],p1[1]); x.lineTo(p2[0],p2[1]); x.stroke(); }
      // feature nodes
      for(var i=0;i<feat.length;i++){ var f=feat[i],pp=proj(f.x,f.y),g=f.glow,rad=DPR*(2.6+g*9);
        if(g>0.02){ var grd=x.createRadialGradient(pp[0],pp[1],0,pp[0],pp[1],rad*4.5); grd.addColorStop(0,'rgba(120,170,240,'+(0.5*g)+')'); grd.addColorStop(1,'rgba(90,140,216,0)'); x.fillStyle=grd; x.beginPath(); x.arc(pp[0],pp[1],rad*4.5,0,6.283); x.fill(); }
        x.beginPath(); x.fillStyle='rgba(200,222,255,'+(0.65+0.35*g)+')'; x.arc(pp[0],pp[1],rad,0,6.283); x.fill();
        if(g>0.3){ x.beginPath(); x.strokeStyle='rgba(150,190,245,'+(g-0.3)+')'; x.lineWidth=DPR; x.arc(pp[0],pp[1],rad+DPR*(6+8*g),0,6.283); x.stroke(); }
      }
      requestAnimationFrame(frame);
    }
    onScroll(); requestAnimationFrame(frame);
  })();
</script>
</body>

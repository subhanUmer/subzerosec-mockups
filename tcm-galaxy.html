<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SubZeroSec — Galaxy (a star system per page)</title>
<link rel="icon" href="./logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     SubZeroSec · GALAXY
     One galaxy, a STAR SYSTEM per page. Scroll warps the camera
     between systems. On arrival, ALL of a system's star details
     show at once as clean left/right callout cards, each tethered
     to its star by a connector. Layered bloom/glint stars.
     ============================================================ */
  :root{
    --bg:#05090F; --fg:#EAF1FF; --muted:#A9B7CE; --faint:#73839B;
    --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.16);
    --accent:#5A8CD8; --fill:#2759A5; --deep:#132D53; --soft:rgba(90,140,216,.18);
    --ease:cubic-bezier(.22,1,.36,1); --maxw:1180px; --mono:"JetBrains Mono",monospace; --cardw:330px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--muted);font-family:"Inter",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--accent);color:#06101f}
  h1,h2,h3,h4{font-family:"Inter";font-weight:800;letter-spacing:-.02em;line-height:1.08;color:var(--fg)}
  .eyebrow{font-size:.74rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
  .txtsh{text-shadow:0 2px 30px rgba(5,9,15,.92),0 1px 4px rgba(5,9,15,.95)}

  @property --ga{syntax:"<angle>";initial-value:0deg;inherits:false}
  .shiny{position:relative;isolation:isolate;overflow:hidden;cursor:pointer;border:1px solid transparent;border-radius:9px;padding:.8rem 1.7rem;font:600 .9rem "Inter";color:#fff;
    background:linear-gradient(var(--fill),var(--fill)) padding-box,conic-gradient(from var(--ga),transparent,var(--accent) 8%,#cfe0ff 14%,var(--accent) 20%,transparent 28%) border-box;
    box-shadow:0 14px 30px -12px rgba(39,89,165,.7);animation:spin 4s linear infinite}
  .shiny::after{content:"";position:absolute;inset:0;z-index:-1;border-radius:inherit;background:linear-gradient(-50deg,transparent,rgba(207,224,255,.5),transparent);mask:radial-gradient(circle at bottom,transparent 42%,#000);opacity:.5;animation:spin 6s linear infinite reverse}
  @keyframes spin{to{--ga:360deg}}
  @media(prefers-reduced-motion:reduce){.shiny,.shiny::after{animation:none}}

  header{position:fixed;top:0;left:0;right:0;z-index:80;background:rgba(5,9,16,.55);backdrop-filter:saturate(150%) blur(14px);border-bottom:1px solid rgba(255,255,255,.07)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:66px;gap:20px;max-width:var(--maxw);margin:0 auto;padding:0 clamp(20px,4vw,40px)}
  .brand{display:flex;align-items:center;gap:.55rem;font-weight:800;font-size:1.06rem;color:#fff}
  .brand img{width:25px;height:25px}.brand .z{color:var(--accent)}
  .nav-links{position:relative;display:flex;align-items:center;gap:.3rem}
  .nav-links a{position:relative;font-size:.85rem;font-weight:500;color:#C4CEDE;padding:.45rem .65rem;transition:color .2s;cursor:pointer}
  .nav-links a:hover,.nav-links a.active{color:#fff}
  .nav-links .uline{position:absolute;bottom:.3rem;height:2px;border-radius:2px;background:var(--accent);box-shadow:0 0 8px rgba(90,140,216,.8);opacity:0;transition:left .35s var(--ease),width .35s var(--ease),opacity .25s;pointer-events:none}
  .nav-end{display:flex;align-items:center;gap:1rem}.nav-end .login{font-size:.85rem;color:var(--fg)}
  .nav-cta{font:600 .85rem "Inter";color:#fff;background:var(--fill);padding:.48rem .95rem;border-radius:7px;cursor:pointer}.nav-cta:hover{background:var(--deep)}
  @media(max-width:980px){.nav-links{display:none}.nav-end .login{display:none}}

  #sky{position:fixed;inset:0;z-index:0;display:block}
  .veil{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(135% 95% at 50% 42%,transparent 55%,rgba(5,9,15,.5) 100%)}
  .journey{position:relative;z-index:2}
  .stage{position:sticky;top:0;height:100vh;overflow:hidden}

  /* system title — centered top */
  .sysHud{position:absolute;left:50%;top:0;transform:translateX(-50%);text-align:center;padding-top:clamp(82px,11vh,116px);width:min(760px,84vw);opacity:0;transition:opacity .4s var(--ease);pointer-events:none;z-index:4}
  .sysHud .lab{font-family:var(--mono);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
  .sysHud h1{font-size:clamp(1.7rem,3.6vw,2.7rem);color:#fff;margin-top:.4rem}
  .sysHud h1 .r{color:var(--accent)}
  .sysHud p{margin:.6rem auto 0;font-size:.96rem;max-width:48ch;color:#cdd8ea}
  .sysHud .hint{margin-top:.9rem;font-family:var(--mono);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);display:inline-flex;align-items:center;gap:.5rem}
  .sysHud .hint .d{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(90,140,216,.18);animation:blip 2s ease-in-out infinite}
  @keyframes blip{0%,100%{opacity:.4}50%{opacity:1}}

  /* callout cards layer */
  #cards{position:absolute;inset:0;z-index:5;pointer-events:none}
  .cl{position:absolute;width:var(--cardw);opacity:0;transition:opacity .3s var(--ease);will-change:left,top,opacity}
  .cl .card{position:relative;cursor:pointer;background:linear-gradient(165deg,rgba(18,32,60,.88),rgba(8,15,32,.93));backdrop-filter:blur(10px);border:1px solid rgba(90,140,216,.42);border-radius:13px;padding:19px 20px 17px;box-shadow:0 24px 56px -26px rgba(0,0,0,.85);transition:border-color .25s,box-shadow .25s,transform .2s var(--ease)}
  .cl.hl .card{border-color:rgba(120,170,235,.75);transform:translateY(-2px)}
  .cl.sel .card{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 22px 52px -26px rgba(0,0,0,.85),0 0 0 1px var(--accent),0 0 26px -2px rgba(90,140,216,.55)}
  .cl .card::after{content:"";position:absolute;right:12px;top:13px;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);transition:.25s}
  .cl.sel .card::after{background:var(--accent);box-shadow:0 0 10px rgba(90,140,216,.9)}
  .cl .lab{font-family:var(--mono);font-size:.68rem;letter-spacing:.16em;color:var(--accent);text-transform:uppercase}
  .cl h3{font-size:1.2rem;color:#fff;margin:.4rem 0 .45rem}
  .cl p{font-size:.92rem;color:var(--muted);line-height:1.55}
  .cl .chips{margin-top:.9rem;display:flex;gap:6px;flex-wrap:wrap}
  .cl .chip{font-family:var(--mono);font-size:.66rem;color:var(--accent);background:var(--soft);border:1px solid rgba(90,140,216,.25);padding:.18rem .5rem;border-radius:6px}
  .cl .br{position:absolute;width:10px;height:10px;border:1.5px solid var(--accent);opacity:.85}
  .cl .tl{top:-1px;left:-1px;border-right:0;border-bottom:0;border-radius:3px 0 0 0}
  .cl .tr{top:-1px;right:-1px;border-left:0;border-bottom:0;border-radius:0 3px 0 0}
  .cl .bl{bottom:-1px;left:-1px;border-right:0;border-top:0;border-radius:0 0 0 3px}
  .cl .brr{bottom:-1px;right:-1px;border-left:0;border-top:0;border-radius:0 0 3px 0}

  .rail{position:fixed;right:18px;top:50%;transform:translateY(-50%);z-index:60;display:flex;flex-direction:column;gap:13px}
  .rail b{display:flex;align-items:center;gap:8px;cursor:pointer;font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);transition:.3s}
  .rail b i{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);transition:.3s}
  .rail b.on{color:var(--fg)}.rail b.on i{background:var(--accent);box-shadow:0 0 10px rgba(90,140,216,.9);transform:scale(1.3)}
  @media(max-width:1040px){.rail{display:none}}
  .badge{position:fixed;left:14px;bottom:14px;z-index:90;font-size:.62rem;font-weight:700;letter-spacing:.1em;color:#fff;background:var(--fill);padding:6px 10px;border-radius:6px}

  /* mobile fallback: simple stacked sections */
  @media(max-width:880px){
    #sky{opacity:.5} .rail{display:none}
    .journey{height:auto!important} .stage{position:static;height:auto}
    .sysHud{position:relative;left:auto;transform:none;width:auto;opacity:1!important;padding:90px 20px 0;text-align:left}
    #cards{position:static;pointer-events:auto}
    .cl{position:relative!important;left:auto!important;top:auto!important;width:auto;opacity:1!important;max-width:520px;margin:14px 20px}
    .mwrap{padding-bottom:40px}
  }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="veil"></div>
<div class="badge">GALAXY · a star system per page · scroll to warp</div>
<div class="rail" id="rail"></div>

<header>
  <div class="nav">
    <a class="brand" href="#"><img src="./logo.png" alt="SubZeroSec logo" />SubZero<span class="z">Sec</span></a>
    <nav class="nav-links" id="navlinks"><span class="uline"></span></nav>
    <div class="nav-end"><a class="login">Login</a><a class="nav-cta" data-sys="4">Get a Free Consultation</a></div>
  </div>
</header>

<div class="journey" id="journey">
  <div class="stage">
    <div class="sysHud" id="sysHud">
      <div class="lab" id="hud-lab">SYSTEM // 01 · HOME</div>
      <h1 id="hud-title">—</h1>
      <p id="hud-tag">—</p>
      <div class="hint"><span class="d"></span> <span id="hud-hint">Scroll to warp between systems</span></div>
    </div>
    <div id="cards"></div>
  </div>
</div>

<script>
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var SYSTEMS=[
    {name:"Home", c:[520,1160], title:'Your environment is a <span class="r">universe of nodes.</span>',
      tag:"Every host, identity and trust relationship is a star. We map them and prove what an attacker reaches.",
      nodes:[
        {x:300,y:1000,lab:"HOME // 01",t:"What we do",d:"Manual, exploit-driven testing across web, cloud, network and people.",c:["Manual","Exploit-proven"]},
        {x:740,y:1010,lab:"HOME // 02",t:"Why it matters",d:"Find the zero-day before it's weaponised — proven, ranked by impact.",c:["Zero false positives"]}
      ]},
    {name:"Capabilities", c:[1620,760], title:"Six capabilities, one constellation.",
      tag:"Each star is an offensive service, orbiting one goal: prove the path before an attacker walks it.",
      nodes:[
        {x:1930,y:760,lab:"CAP // 01",t:"Penetration Testing",d:"Web, API, network, cloud and mobile — confirmed by hand.",c:["Web · API","Cloud"]},
        {x:1780,y:480,lab:"CAP // 02",t:"Red Teaming",d:"Intelligence-led emulation that tests your detection.",c:["TTP-led"]},
        {x:1460,y:480,lab:"CAP // 03",t:"Threat Hunting",d:"Assume-breach hunting for threats already inside.",c:["Telemetry","IOC"]},
        {x:1310,y:760,lab:"CAP // 04",t:"OSINT & Recon",d:"Exposed assets and leaked credentials an attacker finds first.",c:["Exposure"]},
        {x:1460,y:1040,lab:"CAP // 05",t:"Attack-Surface",d:"Everything reachable from outside, mapped and ranked.",c:["External","Ranked"]},
        {x:1780,y:1040,lab:"CAP // 06",t:"Compliance Testing",d:"Mapped to ISO 27001, SOC 2 and PCI DSS.",c:["ISO 27001","SOC 2"]}
      ]},
    {name:"Approach", c:[2560,1500], title:"Three moves, every engagement.",
      tag:"A repeatable orbit — map the surface, prove the path, verify the fix.",
      nodes:[
        {x:2330,y:1380,lab:"STEP // 01",t:"Map",d:"Enumerate the real attack surface and build the graph.",c:["Recon"]},
        {x:2790,y:1380,lab:"STEP // 02",t:"Prove",d:"Walk the path by hand; prove every finding with an exploit.",c:["Exploit"]},
        {x:2560,y:1730,lab:"STEP // 03",t:"Verify",d:"Rank by impact, support the fix, re-test until it holds.",c:["Retest"]}
      ]},
    {name:"Proof", c:[3300,620], title:"Measured in outcomes.",
      tag:"Proof, not noise — a track record across industries and engagements.",
      nodes:[
        {x:3090,y:490,lab:"STAT // 01",t:"340+ assessments",d:"Exploit-driven engagements delivered across the region.",c:["Delivered"]},
        {x:3510,y:490,lab:"STAT // 02",t:"127+ critical findings",d:"High-impact issues proven with working exploits.",c:["Proven"]},
        {x:3090,y:770,lab:"STAT // 03",t:"98% remediation verified",d:"Fixes re-tested within the engagement window.",c:["Verified"]},
        {x:3510,y:770,lab:"STAT // 04",t:"15+ industries",d:"From banks and telecoms to fintech scale-ups.",c:["Secured"]}
      ]},
    {name:"Contact", c:[3820,1650], title:'Ready to map your <span class="r">universe?</span>',
      tag:"Book a scoped assessment — we'll chart every reachable node and prove the exploitable paths.",
      nodes:[
        {x:3600,y:1520,lab:"CONTACT // 01",t:"Free scoping call",d:"A 30-minute call to scope your environment.",c:["No obligation"]},
        {x:4040,y:1520,lab:"CONTACT // 02",t:"hello@subzerosec.com",d:"Islamabad, Pakistan · replies within one business day.",c:["LinkedIn","X"]}
      ]}
  ];

  /* nav + rail + DOM cards */
  var nav=document.getElementById('navlinks'), rail=document.getElementById('rail'), cardsLayer=document.getElementById('cards');
  var selNode=null, hovNode=null;
  function updateSel(){ SYSTEMS.forEach(function(sy){sy.nodes.forEach(function(n){n.el.classList.toggle('sel',n===selNode);});}); }
  SYSTEMS.forEach(function(s,si){
    var a=document.createElement('a'); a.textContent=s.name; a.dataset.sys=si; if(si===0)a.className='active'; nav.appendChild(a);
    var b=document.createElement('b'); b.dataset.sys=si; b.innerHTML='<i></i>'+s.name; rail.appendChild(b);
    s.nodes.forEach(function(n){
      var el=document.createElement('div'); el.className='cl';
      el.innerHTML='<div class="card"><span class="br tl"></span><span class="br tr"></span><span class="br bl"></span><span class="br brr"></span>'+
        '<div class="lab">'+n.lab+'</div><h3>'+n.t+'</h3><p>'+n.d+'</p><div class="chips">'+n.c.map(function(z){return '<span class="chip">'+z+'</span>';}).join('')+'</div></div>';
      n.el=el; cardsLayer.appendChild(el);
      el.addEventListener('click',function(ev){ ev.stopPropagation(); selNode=(selNode===n)?null:n; updateSel(); });
      el.addEventListener('pointerenter',function(){ hovNode=n; el.classList.add('hl'); });
      el.addEventListener('pointerleave',function(){ if(hovNode===n)hovNode=null; el.classList.remove('hl'); });
    });
  });
  var navLinks=[].slice.call(nav.querySelectorAll('a')), railItems=[].slice.call(rail.querySelectorAll('b'));

  var uline=nav.querySelector('.uline');
  function moveU(el){var b=nav.getBoundingClientRect(),r=el.getBoundingClientRect();uline.style.left=(r.left-b.left)+'px';uline.style.width=r.width+'px';uline.style.opacity=1;}
  navLinks.forEach(function(a){a.addEventListener('mouseenter',function(){moveU(a);});});
  nav.addEventListener('mouseleave',function(){var a=nav.querySelector('a.active');if(a)moveU(a);});

  var S=SYSTEMS.length, SEG=1.35;   // viewport-heights of scroll per system
  var journey=document.getElementById('journey');
  function layout(){ journey.style.height=((S-1)*SEG*100+100)+'vh'; var a=nav.querySelector('a.active'); if(a)moveU(a); }
  layout(); addEventListener('resize',layout);
  function goSys(i){ scrollTo({top:journey.offsetTop+i*SEG*innerHeight,behavior:'smooth'}); }
  document.addEventListener('click',function(e){var g=e.target.closest('[data-sys]');if(g){e.preventDefault();goSys(+g.dataset.sys);}});

  /* ===== canvas galaxy ===== */
  (function(){
    var c=document.getElementById('sky'), x=c.getContext('2d'), DPR=Math.min(devicePixelRatio||1,2);
    var W,H,cssW,cssH, stars=[], WW=4500,WH=2300, sysHud=document.getElementById('sysHud');
    function size(){ cssW=innerWidth;cssH=innerHeight;W=c.width=cssW*DPR;H=c.height=cssH*DPR;c.style.width=cssW+'px';c.style.height=cssH+'px'; build(); recompute(); }
    function build(){ stars=[]; var tiers=[{n:Math.round(WW*WH/15000),rmin:.5,rmax:1.1,glint:false,a:.5,par:6},
                                           {n:Math.round(WW*WH/42000),rmin:1.0,rmax:1.8,glint:false,a:.75,par:13},
                                           {n:Math.round(WW*WH/130000),rmin:1.8,rmax:3.0,glint:true,a:.95,par:22}];
      tiers.forEach(function(T){ for(var i=0;i<T.n;i++){ var warm=Math.random()<0.1;
        stars.push({x:Math.random()*WW,y:Math.random()*WH,r:T.rmin+Math.random()*(T.rmax-T.rmin),ph:Math.random()*6.28,sp:.4+Math.random()*1.2,glint:T.glint,a:T.a,par:T.par,
          col:warm?[212,202,172]:[Math.random()<.4?150:200,Math.random()<.4?185:222,255]}); } }); }
    var SZ; function recompute(){ SZ=0.62*W/900; }   // frame a whole system (with room for side cards)
    size(); addEventListener('resize',function(){size();onScroll();});
    var pt={mx:0,my:0,tmx:0,tmy:0};
    addEventListener('pointermove',function(e){pt.tmx=(e.clientX/cssW*2-1);pt.tmy=(e.clientY/cssH*2-1);});

    var cam={x:SYSTEMS[0].c[0],y:SYSTEMS[0].c[1],s:0.4},tgt={x:cam.x,y:cam.y,s:0.4};
    function lerp(a,b,t){return a+(b-a)*t;}
    function sstep(a,b,v){var t=Math.min(Math.max((v-a)/(b-a),0),1);return t*t*(3-2*t);}
    function proj(wx,wy){return [(wx-cam.x)*cam.s+W/2 - pt.mx*14*DPR,(wy-cam.y)*cam.s+H/2 - pt.my*14*DPR];}

    var sf=0, shown=-1, TOPM=150, BOTM=22, GAP=16, CARDW=330;
    function onScroll(){
      var top=journey.offsetTop, segPx=SEG*innerHeight;
      var f=Math.min(Math.max((scrollY-top)/segPx,0),S-1); sf=f;
      var i0=Math.floor(f),s=f-i0,i1=Math.min(i0+1,S-1);
      var warp=sstep(0.26,0.74,s);                  // wide, eased travel between systems
      tgt.x=lerp(SYSTEMS[i0].c[0],SYSTEMS[i1].c[0],warp);
      tgt.y=lerp(SYSTEMS[i0].c[1],SYSTEMS[i1].c[1],warp);
      var wAmt=(s>0.26&&s<0.74)?Math.sin(Math.PI*(s-0.26)/0.48):0;
      tgt.s=SZ*(1-0.42*wAmt);
      var sh=(s<0.5)?i0:i1;
      if(sh!==shown){ swapSystem(sh); }
      navLinks.forEach(function(l,k){l.classList.toggle('active',k===sh);});
      railItems.forEach(function(r,k){r.classList.toggle('on',k===sh);});
      var a=nav.querySelector('a.active'); if(a)moveU(a);
    }
    addEventListener('scroll',onScroll,{passive:true});

    function swapSystem(si){
      if(shown>=0) SYSTEMS[shown].nodes.forEach(function(n){n.el.style.display='none';n.el.classList.remove('hl');});
      selNode=null; hovNode=null; updateSel();
      shown=si; var sy=SYSTEMS[si];
      sy.nodes.forEach(function(n){n.el.style.display='block';});
      sysHud.querySelector('#hud-lab').textContent='SYSTEM // 0'+(si+1)+' · '+sy.name.toUpperCase();
      sysHud.querySelector('#hud-title').innerHTML=sy.title;
      sysHud.querySelector('#hud-tag').textContent=sy.tag;
    }

    function placeSide(list,side,opacity){
      list.sort(function(a,b){return a._sy-b._sy;});
      var X=side==='L'?22:(cssW-CARDW-22), prevB=TOPM;
      list.forEach(function(n){ var el=n.el, h=el.offsetHeight||140, y=Math.max(n._sy-h/2,prevB); y=Math.min(y,cssH-h-BOTM); y=Math.max(y,TOPM); prevB=y+h+GAP;
        el.style.left=X+'px'; el.style.top=y+'px'; el.style.opacity=opacity; el.style.pointerEvents=opacity>0.6?'auto':'none';
        n._cx=side==='L'?(X+CARDW):X; n._cy=y+22; });
    }

    var t0=performance.now();
    function frame(now){
      var t=(now-t0)/1000;
      pt.mx=lerp(pt.mx,pt.tmx,0.06); pt.my=lerp(pt.my,pt.tmy,0.06);
      cam.x=lerp(cam.x,tgt.x,0.055); cam.y=lerp(cam.y,tgt.y,0.055); cam.s=lerp(cam.s,tgt.s,0.055);

      x.clearRect(0,0,W,H);
      for(var i=0;i<stars.length;i++){ var s=stars[i];
        var px=(s.x-cam.x)*cam.s+W/2 - pt.mx*s.par*DPR, py=(s.y-cam.y)*cam.s+H/2 - pt.my*s.par*DPR;
        if(px<-40||px>W+40||py<-40||py>H+40) continue;
        var tw=0.6+0.4*Math.sin(t*s.sp+s.ph), rr=s.r*DPR, col=s.col;
        if(s.glint){ var g=x.createRadialGradient(px,py,0,px,py,rr*7); g.addColorStop(0,'rgba('+col[0]+','+col[1]+','+col[2]+','+(0.18*tw)+')'); g.addColorStop(1,'rgba('+col[0]+','+col[1]+','+col[2]+',0)'); x.fillStyle=g; x.beginPath(); x.arc(px,py,rr*7,0,6.283); x.fill();
          x.strokeStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(0.4*tw)+')'; x.lineWidth=DPR*0.6; x.beginPath(); x.moveTo(px-rr*3,py); x.lineTo(px+rr*3,py); x.moveTo(px,py-rr*3); x.lineTo(px,py+rr*3); x.stroke(); }
        x.beginPath(); x.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(s.a*tw)+')'; x.arc(px,py,rr,0,6.283); x.fill();
      }
      // systems: suns + spokes + nodes
      for(var si=0;si<SYSTEMS.length;si++){ var sy=SYSTEMS[si], near=(si===shown), scn=proj(sy.c[0],sy.c[1]);
        for(var k=0;k<sy.nodes.length;k++){ var np=proj(sy.nodes[k].x,sy.nodes[k].y);
          x.strokeStyle='rgba(90,140,216,'+(near?0.4:0.12)+')'; x.lineWidth=DPR*(near?1:0.6); x.beginPath(); x.moveTo(scn[0],scn[1]); x.lineTo(np[0],np[1]); x.stroke(); }
        var sr=DPR*(near?6.5:4), gg=x.createRadialGradient(scn[0],scn[1],0,scn[0],scn[1],sr*5); gg.addColorStop(0,'rgba(150,190,250,'+(near?.6:.28)+')'); gg.addColorStop(1,'rgba(90,140,216,0)'); x.fillStyle=gg; x.beginPath(); x.arc(scn[0],scn[1],sr*5,0,6.283); x.fill();
        x.beginPath(); x.fillStyle='#dbe8ff'; x.arc(scn[0],scn[1],sr,0,6.283); x.fill();
        for(var k=0;k<sy.nodes.length;k++){ var nd=sy.nodes[k], np=proj(nd.x,nd.y);
          var hl = near ? ((nd===selNode)?2:(nd===hovNode)?1:0) : 0;
          var rr=DPR*(near?(hl===2?8.5:hl===1?6.2:5):3.2), hr=rr*(near?(hl?5.5:4.5):3);
          var g2=x.createRadialGradient(np[0],np[1],0,np[0],np[1],hr); g2.addColorStop(0,'rgba(120,170,240,'+(near?(hl?.7:.5):.22)+')'); g2.addColorStop(1,'rgba(90,140,216,0)'); x.fillStyle=g2; x.beginPath(); x.arc(np[0],np[1],hr,0,6.283); x.fill();
          x.beginPath(); x.fillStyle=hl?'#eaf3ff':'rgba(210,228,255,'+(near?1:.7)+')'; x.arc(np[0],np[1],rr,0,6.283); x.fill();
          if(hl===1){ x.beginPath(); x.strokeStyle='rgba(150,190,245,.7)'; x.lineWidth=DPR*1.1; x.arc(np[0],np[1],rr+DPR*7,0,6.283); x.stroke(); }
          if(hl===2){ var pr=rr+DPR*(9+5*Math.sin(t*3)); x.beginPath(); x.strokeStyle='rgba(160,200,250,.85)'; x.lineWidth=DPR*1.4; x.arc(np[0],np[1],pr,0,6.283); x.stroke();
            x.beginPath(); x.strokeStyle='rgba(120,170,240,.4)'; x.lineWidth=DPR*1; x.arc(np[0],np[1],pr+DPR*7,0,6.283); x.stroke(); }
          if(near){ nd._sx=np[0]/DPR; nd._sy=np[1]/DPR; }
        }
      }
      // layout + draw connectors for the shown system's cards
      var i0=Math.floor(sf), s=sf-i0;
      var op = (s<0.26||s>0.74)?1:(1-Math.sin(Math.PI*(s-0.26)/0.48)); // full on dwell, eases to 0 mid-warp
      if(shown>=0){
        var sy=SYSTEMS[shown], L=[],R=[];
        sy.nodes.forEach(function(n){ (n._sx<cssW/2?L:R).push(n); });
        placeSide(L,'L',op); placeSide(R,'R',op);
        sysHud.style.opacity=op*0.97;
        if(op>0.04){ sy.nodes.forEach(function(n){
          var hot=(n===selNode||n===hovNode);
          x.strokeStyle='rgba('+(hot?'130,180,250':'90,140,216')+','+((hot?1:0.75)*op)+')'; x.lineWidth=DPR*(hot?1.7:1.05);
          x.beginPath(); x.moveTo(n._sx*DPR,n._sy*DPR); x.lineTo(n._cx*DPR,n._cy*DPR); x.stroke();
          x.beginPath(); x.fillStyle='rgba(156,192,255,'+op+')'; x.arc(n._cx*DPR,n._cy*DPR,DPR*(hot?3:2.2),0,6.283); x.fill();
        }); }
      }
      requestAnimationFrame(frame);
    }
    swapSystem(0); onScroll(); requestAnimationFrame(frame);
  })();
</script>

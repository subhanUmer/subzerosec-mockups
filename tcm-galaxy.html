<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SubZeroSec — Galaxy (a star system per page)</title>
<link rel="icon" href="./logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     SubZeroSec · GALAXY
     One galaxy, a STAR SYSTEM per page. Scroll warps the camera
     between systems; inside each system the section details pop
     up from the stars as techy HUD popups tethered by a connector.
     Layered bloom/glint stars. Royal-blue scheme.
     ============================================================ */
  :root{
    --bg:#05090F; --fg:#EAF1FF; --muted:#A9B7CE; --faint:#73839B;
    --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.16);
    --accent:#5A8CD8; --fill:#2759A5; --deep:#132D53; --soft:rgba(90,140,216,.18);
    --ease:cubic-bezier(.22,1,.36,1); --maxw:1180px; --mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--muted);font-family:"Inter",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--accent);color:#06101f}
  h1,h2,h3,h4{font-family:"Inter";font-weight:800;letter-spacing:-.02em;line-height:1.08;color:var(--fg)}
  .eyebrow{font-size:.74rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
  .txtsh{text-shadow:0 2px 30px rgba(5,9,15,.92),0 1px 4px rgba(5,9,15,.95)}

  @property --ga{syntax:"<angle>";initial-value:0deg;inherits:false}
  .shiny{position:relative;isolation:isolate;overflow:hidden;cursor:pointer;border:1px solid transparent;border-radius:9px;padding:.85rem 1.9rem;font:600 .92rem "Inter";color:#fff;
    background:linear-gradient(var(--fill),var(--fill)) padding-box,conic-gradient(from var(--ga),transparent,var(--accent) 8%,#cfe0ff 14%,var(--accent) 20%,transparent 28%) border-box;
    box-shadow:0 14px 30px -12px rgba(39,89,165,.7);animation:spin 4s linear infinite;pointer-events:auto}
  .shiny::after{content:"";position:absolute;inset:0;z-index:-1;border-radius:inherit;background:linear-gradient(-50deg,transparent,rgba(207,224,255,.5),transparent);mask:radial-gradient(circle at bottom,transparent 42%,#000);opacity:.5;animation:spin 6s linear infinite reverse}
  @keyframes spin{to{--ga:360deg}}
  @media(prefers-reduced-motion:reduce){.shiny,.shiny::after{animation:none}}

  /* header + underline navbar (links fly to systems) */
  header{position:fixed;top:0;left:0;right:0;z-index:80;background:rgba(5,9,16,.5);backdrop-filter:saturate(150%) blur(14px);border-bottom:1px solid rgba(255,255,255,.07)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:68px;gap:20px;max-width:var(--maxw);margin:0 auto;padding:0 clamp(20px,4vw,40px)}
  .brand{display:flex;align-items:center;gap:.55rem;font-weight:800;font-size:1.08rem;color:#fff}
  .brand img{width:26px;height:26px}.brand .z{color:var(--accent)}
  .nav-links{position:relative;display:flex;align-items:center;gap:.3rem}
  .nav-links a{position:relative;font-size:.86rem;font-weight:500;color:#C4CEDE;padding:.5rem .7rem;transition:color .2s;cursor:pointer}
  .nav-links a:hover,.nav-links a.active{color:#fff}
  .nav-links .uline{position:absolute;bottom:.34rem;height:2px;border-radius:2px;background:var(--accent);box-shadow:0 0 8px rgba(90,140,216,.8);opacity:0;transition:left .35s var(--ease),width .35s var(--ease),opacity .25s;pointer-events:none}
  .nav-end{display:flex;align-items:center;gap:1rem}.nav-end .login{font-size:.86rem;color:var(--fg)}
  .nav-cta{font:600 .86rem "Inter";color:#fff;background:var(--fill);padding:.5rem 1rem;border-radius:7px;cursor:pointer}.nav-cta:hover{background:var(--deep)}
  @media(max-width:980px){.nav-links{display:none}.nav-end .login{display:none}}

  /* fixed canvas + sticky stage */
  #sky{position:fixed;inset:0;z-index:0;display:block}
  .veil{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(130% 90% at 50% 40%,transparent 50%,rgba(5,9,15,.55) 100%)}
  .journey{position:relative;z-index:2}
  .stage{position:sticky;top:0;height:100vh;overflow:hidden;pointer-events:none}

  /* system title overlay */
  .sysHud{position:absolute;left:0;right:0;top:0;padding:clamp(92px,14vh,140px) clamp(20px,5vw,60px) 0;opacity:0;transition:opacity .4s var(--ease)}
  .sysHud .in{max-width:var(--maxw);margin:0 auto}
  .sysHud .lab{font-family:var(--mono);font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
  .sysHud h1{font-size:clamp(2rem,4.6vw,3.4rem);color:#fff;margin-top:.5rem;max-width:18ch;line-height:1.05}
  .sysHud h1 .r{color:var(--accent)}
  .sysHud p{margin-top:.8rem;font-size:1rem;max-width:42ch;color:#cdd8ea}
  .sysHud .hint{margin-top:1.4rem;font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);display:flex;align-items:center;gap:.5rem}
  .sysHud .hint .d{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(90,140,216,.18);animation:blip 2s ease-in-out infinite}
  @keyframes blip{0%,100%{opacity:.4}50%{opacity:1}}

  /* techy HUD popup tethered to a star */
  .pop{position:absolute;z-index:5;width:300px;pointer-events:none;opacity:0;transition:opacity .28s var(--ease)}
  .pop .card{position:relative;background:linear-gradient(165deg,rgba(18,32,60,.84),rgba(8,15,32,.9));backdrop-filter:blur(10px);border:1px solid rgba(90,140,216,.42);border-radius:12px;padding:17px 18px 15px;box-shadow:0 26px 60px -26px rgba(0,0,0,.85)}
  .pop .lab{font-family:var(--mono);font-size:.64rem;letter-spacing:.16em;color:var(--accent);text-transform:uppercase}
  .pop h3{font-size:1.1rem;color:#fff;margin:.3rem 0 .35rem}
  .pop p{font-size:.84rem;color:var(--muted)}
  .pop .chips{margin-top:.7rem;display:flex;gap:6px;flex-wrap:wrap}
  .pop .chip{font-family:var(--mono);font-size:.62rem;color:var(--accent);background:var(--soft);border:1px solid rgba(90,140,216,.25);padding:.16rem .48rem;border-radius:5px}
  .pop .br{position:absolute;width:11px;height:11px;border:1.5px solid var(--accent);opacity:.85}
  .pop .tl{top:-1px;left:-1px;border-right:0;border-bottom:0;border-radius:3px 0 0 0}
  .pop .tr{top:-1px;right:-1px;border-left:0;border-bottom:0;border-radius:0 3px 0 0}
  .pop .bl{bottom:-1px;left:-1px;border-right:0;border-top:0;border-radius:0 0 0 3px}
  .pop .brr{bottom:-1px;right:-1px;border-left:0;border-top:0;border-radius:0 0 3px 0}

  /* system rail */
  .rail{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:60;display:flex;flex-direction:column;gap:14px}
  .rail b{display:flex;align-items:center;gap:8px;cursor:pointer;font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);transition:.3s}
  .rail b i{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);transition:.3s}
  .rail b.on{color:var(--fg)}.rail b.on i{background:var(--accent);box-shadow:0 0 10px rgba(90,140,216,.9);transform:scale(1.3)}
  @media(max-width:980px){.rail{display:none}}
  .badge{position:fixed;left:14px;bottom:14px;z-index:90;font-size:.62rem;font-weight:700;letter-spacing:.1em;color:#fff;background:var(--fill);padding:6px 10px;border-radius:6px}

  @media(max-width:760px){.sysHud h1{font-size:1.8rem}.pop{width:240px}}
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="veil"></div>
<div class="badge">GALAXY · a star system per page · scroll to warp</div>
<div class="rail" id="rail"></div>

<header>
  <div class="nav">
    <a class="brand" href="#"><img src="./logo.png" alt="SubZeroSec logo" />SubZero<span class="z">Sec</span></a>
    <nav class="nav-links" id="navlinks"><span class="uline"></span></nav>
    <div class="nav-end"><a class="login">Login</a><a class="nav-cta" data-sys="4">Get a Free Consultation</a></div>
  </div>
</header>

<div class="journey" id="journey">
  <div class="stage">
    <div class="sysHud" id="sysHud"><div class="in">
      <div class="lab" id="hud-lab">SYSTEM // 00</div>
      <h1 id="hud-title">—</h1>
      <p id="hud-tag">—</p>
      <div class="hint"><span class="d"></span> <span id="hud-hint">Scroll to warp between systems</span></div>
    </div></div>
    <div class="pop" id="pop"><div class="card">
      <span class="br tl"></span><span class="br tr"></span><span class="br bl"></span><span class="br brr"></span>
      <div class="lab" id="pop-lab">—</div><h3 id="pop-title">—</h3><p id="pop-desc">—</p><div class="chips" id="pop-chips"></div>
    </div></div>
  </div>
</div>

<script>
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ===== the galaxy: one star system per page ===== */
  var SYSTEMS=[
    {name:"Home", c:[520,1180], title:'Your environment is a <span class="r">universe of nodes.</span>',
      tag:"Every host, identity and trust relationship is a star. We map them and prove what an attacker reaches.",
      nodes:[
        {x:330,y:1030,lab:"HOME // 01",t:"What we do",d:"Manual, exploit-driven testing and adversary simulation across web, cloud, network and people.",c:["Manual","Exploit-proven"]},
        {x:710,y:1040,lab:"HOME // 02",t:"Why it matters",d:"We find the zero-day before it's weaponised — every finding proven and ranked by real business impact.",c:["Zero false positives"]}
      ]},
    {name:"Capabilities", c:[1620,760], title:"Six capabilities, one constellation.",
      tag:"Each star is an offensive service — they orbit a single goal: prove the path before an attacker walks it.",
      nodes:[
        {x:1920,y:760,lab:"CAP // 01",t:"Penetration Testing",d:"Web, API, network, cloud and mobile — every vulnerability confirmed by hand with a working exploit path.",c:["Web · API","Cloud"]},
        {x:1770,y:500,lab:"CAP // 02",t:"Red Teaming",d:"Intelligence-led adversary emulation that tests whether your people, process and detection stop a real intrusion.",c:["TTP-led"]},
        {x:1470,y:500,lab:"CAP // 03",t:"Threat Hunting",d:"Assume-breach hunting that surfaces threats already inside before they escalate to an incident.",c:["Telemetry","IOC"]},
        {x:1320,y:760,lab:"CAP // 04",t:"OSINT & Recon",d:"Exposed assets, leaked credentials and the intelligence an adversary gathers before ever touching you.",c:["Exposure"]},
        {x:1470,y:1020,lab:"CAP // 05",t:"Attack-Surface",d:"Continuous visibility of everything reachable from outside — mapped and ranked the way an attacker sees it.",c:["External","Ranked"]},
        {x:1770,y:1020,lab:"CAP // 06",t:"Compliance Testing",d:"Targeted assessments mapped to ISO 27001, SOC 2 and PCI DSS — with the evidence auditors expect.",c:["ISO 27001","SOC 2"]}
      ]},
    {name:"Approach", c:[2560,1500], title:"Three moves, every engagement.",
      tag:"A repeatable orbit — map the surface, prove the path, verify the fix.",
      nodes:[
        {x:2360,y:1380,lab:"STEP // 01",t:"Map",d:"We enumerate the real attack surface and build the graph an adversary would.",c:["Recon"]},
        {x:2760,y:1380,lab:"STEP // 02",t:"Prove",d:"We walk the path by hand and prove every finding with a working exploit.",c:["Exploit"]},
        {x:2560,y:1720,lab:"STEP // 03",t:"Verify",d:"We rank by impact, support the fix and re-test until it holds.",c:["Retest"]}
      ]},
    {name:"Proof", c:[3300,620], title:"Measured in outcomes.",
      tag:"Proof, not noise — a track record across industries and engagements.",
      nodes:[
        {x:3110,y:500,lab:"STAT // 01",t:"340+ assessments",d:"Manual, exploit-driven engagements delivered across the region.",c:["Delivered"]},
        {x:3490,y:500,lab:"STAT // 02",t:"127+ critical findings",d:"High-impact vulnerabilities proven with working exploits.",c:["Proven"]},
        {x:3110,y:760,lab:"STAT // 03",t:"98% remediation verified",d:"Fixes re-tested within the engagement window — and confirmed.",c:["Verified"]},
        {x:3490,y:760,lab:"STAT // 04",t:"15+ industries",d:"From banks and telecoms to fintech scale-ups.",c:["Secured"]}
      ]},
    {name:"Contact", c:[3820,1650], title:"Ready to map your <span class=\"r\">universe?</span>",
      tag:"Book a scoped assessment — we'll chart every reachable node and prove the exploitable paths.",
      nodes:[
        {x:3640,y:1520,lab:"CONTACT // 01",t:"Free scoping call",d:"A 30-minute call to scope your environment and outline an engagement.",c:["No obligation"]},
        {x:4000,y:1520,lab:"CONTACT // 02",t:"hello@subzerosec.com",d:"Islamabad, Pakistan · responses within one business day.",c:["LinkedIn","X"]}
      ]}
  ];

  /* build nav + rail + flat step list */
  var nav=document.getElementById('navlinks'), rail=document.getElementById('rail'), STEPS=[], sysStart=[];
  SYSTEMS.forEach(function(s,si){
    sysStart.push(STEPS.length);
    s.nodes.forEach(function(n){ STEPS.push({si:si, x:n.x, y:n.y, lab:n.lab, t:n.t, d:n.d, c:n.c}); });
    var a=document.createElement('a'); a.textContent=s.name; a.dataset.sys=si; if(si===0)a.className='active'; nav.appendChild(a);
    var b=document.createElement('b'); b.dataset.sys=si; b.innerHTML='<i></i>'+s.name; rail.appendChild(b);
  });
  var navLinks=[].slice.call(nav.querySelectorAll('a')), railItems=[].slice.call(rail.querySelectorAll('b'));
  var ROM=['I','II','III','IV','V','VI'];

  /* underline navbar follows active */
  var uline=nav.querySelector('.uline');
  function moveU(el){var b=nav.getBoundingClientRect(),r=el.getBoundingClientRect();uline.style.left=(r.left-b.left)+'px';uline.style.width=r.width+'px';uline.style.opacity=1;}
  navLinks.forEach(function(a){a.addEventListener('mouseenter',function(){moveU(a);});});
  nav.addEventListener('mouseleave',function(){var a=nav.querySelector('a.active');if(a)moveU(a);});
  addEventListener('resize',function(){var a=nav.querySelector('a.active');if(a)moveU(a);});

  var N=STEPS.length, STEP=0.66;
  var journey=document.getElementById('journey');
  function layout(){ journey.style.height=((N-1)*STEP*100+100)+'vh'; var a=nav.querySelector('a.active'); if(a)moveU(a); }
  layout(); addEventListener('resize',layout);
  function goStep(i){ scrollTo({top:journey.offsetTop+i*STEP*innerHeight,behavior:'smooth'}); }
  document.addEventListener('click',function(e){var g=e.target.closest('[data-sys]');if(g){e.preventDefault();goStep(sysStart[+g.dataset.sys]);}});

  /* ===== canvas galaxy + warping camera ===== */
  (function(){
    var c=document.getElementById('sky'), x=c.getContext('2d'), DPR=Math.min(devicePixelRatio||1,2);
    var W,H,cssW,cssH, stars=[], WW=4400, WH=2300;
    var pop=document.getElementById('pop'), sysHud=document.getElementById('sysHud');
    function size(){ cssW=innerWidth;cssH=innerHeight; W=c.width=cssW*DPR;H=c.height=cssH*DPR;c.style.width=cssW+'px';c.style.height=cssH+'px'; build(); recompute(); }
    function build(){ stars=[]; var tiers=[{n:Math.round(WW*WH/14000),rmin:.5,rmax:1.1,glint:false,a:.5},
                                           {n:Math.round(WW*WH/40000),rmin:1.0,rmax:1.8,glint:false,a:.75},
                                           {n:Math.round(WW*WH/120000),rmin:1.8,rmax:3.0,glint:true,a:.95}];
      tiers.forEach(function(T){ for(var i=0;i<T.n;i++){ var warm=Math.random()<0.1;
        stars.push({x:Math.random()*WW,y:Math.random()*WH,r:T.rmin+Math.random()*(T.rmax-T.rmin),ph:Math.random()*6.28,sp:.4+Math.random()*1.2,glint:T.glint,a:T.a,par:T.glint?22:(T.a<.6?6:13),
          col:warm?[212,202,172]:[Math.random()<.4?150:200,Math.random()<.4?185:222,255]}); } }); }

    var SZ; function recompute(){ SZ=0.8*W/820; }   // system framing scale (device px / world unit)
    size(); addEventListener('resize',function(){size();onScroll();});
    var pointer={mx:0,my:0,tmx:0,tmy:0};
    addEventListener('pointermove',function(e){ pointer.tmx=(e.clientX/cssW*2-1); pointer.tmy=(e.clientY/cssH*2-1); });

    var cam={x:SYSTEMS[0].c[0],y:SYSTEMS[0].c[1],s:0.4}, tgt={x:cam.x,y:cam.y,s:0.4}, sf=0, activeStep=-1, activeSys=-1;
    function lerp(a,b,t){return a+(b-a)*t;}
    function proj(wx,wy){ return [(wx-cam.x)*cam.s + W/2 - pointer.mx*16*DPR, (wy-cam.y)*cam.s + H/2 - pointer.my*16*DPR]; }
    function stepCam(i){ var st=STEPS[i], sy=SYSTEMS[st.si];
      return [ lerp(sy.c[0],st.x,0.32), lerp(sy.c[1],st.y,0.32) ]; }   // frame system, nudge toward node

    function onScroll(){
      var top=journey.offsetTop, stepPx=STEP*innerHeight;
      var f=Math.min(Math.max((scrollY-top)/stepPx,0),N-1); sf=f;
      var i0=Math.floor(f),i1=Math.min(i0+1,N-1),fr=f-i0,fe=fr*fr*(3-2*fr);
      var a=stepCam(i0),b=stepCam(i1);
      tgt.x=lerp(a[0],b[0],fe); tgt.y=lerp(a[1],b[1],fe);
      var warp = STEPS[i0].si!==STEPS[i1].si;          // crossing systems → zoom out mid-way (hyperspace)
      tgt.s = SZ * (warp ? (1-0.5*Math.sin(Math.PI*fr)) : 1);
      var near=Math.round(f);
      if(near!==activeStep){ activeStep=near; setPopup(near);
        var si=STEPS[near].si; if(si!==activeSys){ activeSys=si; setSys(si); } }
      // nav + rail
      var si=STEPS[near].si;
      navLinks.forEach(function(l,k){l.classList.toggle('active',k===si);});
      railItems.forEach(function(r,k){r.classList.toggle('on',k===si);});
      var a2=nav.querySelector('a.active'); if(a2)moveU(a2);
    }
    addEventListener('scroll',onScroll,{passive:true});

    function setPopup(i){ var s=STEPS[i];
      document.getElementById('pop-lab').textContent=s.lab; document.getElementById('pop-title').textContent=s.t;
      document.getElementById('pop-desc').textContent=s.d; document.getElementById('pop-chips').innerHTML=s.c.map(function(z){return '<span class="chip">'+z+'</span>';}).join(''); }
    function setSys(si){ var s=SYSTEMS[si];
      document.getElementById('hud-lab').textContent='SYSTEM // 0'+(si+1)+' · '+s.name.toUpperCase();
      document.getElementById('hud-title').innerHTML=s.title; document.getElementById('hud-tag').textContent=s.tag; }

    var t0=performance.now();
    function frame(now){
      var t=(now-t0)/1000;
      pointer.mx=lerp(pointer.mx,pointer.tmx,0.06); pointer.my=lerp(pointer.my,pointer.tmy,0.06);
      cam.x=lerp(cam.x,tgt.x,0.07); cam.y=lerp(cam.y,tgt.y,0.07); cam.s=lerp(cam.s,tgt.s,0.07);

      x.clearRect(0,0,W,H);
      // stars
      for(var i=0;i<stars.length;i++){ var s=stars[i];
        var px=(s.x-cam.x)*cam.s+W/2 - pointer.mx*s.par*DPR, py=(s.y-cam.y)*cam.s+H/2 - pointer.my*s.par*DPR;
        if(px<-40||px>W+40||py<-40||py>H+40) continue;
        var tw=0.6+0.4*Math.sin(t*s.sp+s.ph), rr=s.r*DPR, col=s.col;
        if(s.glint){ var g=x.createRadialGradient(px,py,0,px,py,rr*7); g.addColorStop(0,'rgba('+col[0]+','+col[1]+','+col[2]+','+(0.18*tw)+')'); g.addColorStop(1,'rgba('+col[0]+','+col[1]+','+col[2]+',0)'); x.fillStyle=g; x.beginPath(); x.arc(px,py,rr*7,0,6.283); x.fill();
          x.strokeStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(0.45*tw)+')'; x.lineWidth=DPR*0.6; x.beginPath(); x.moveTo(px-rr*3,py); x.lineTo(px+rr*3,py); x.moveTo(px,py-rr*3); x.lineTo(px,py+rr*3); x.stroke(); }
        x.beginPath(); x.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(s.a*tw)+')'; x.arc(px,py,rr,0,6.283); x.fill();
      }
      // per-system: sun + spokes + node stars
      var activeWorld=null;
      for(var si=0;si<SYSTEMS.length;si++){ var sy=SYSTEMS[si], near=(si===activeSys);
        var sc=proj(sy.c[0],sy.c[1]);
        // spokes sun->nodes
        for(var k=0;k<sy.nodes.length;k++){ var np=proj(sy.nodes[k].x,sy.nodes[k].y);
          x.strokeStyle='rgba(90,140,216,'+(near?0.4:0.14)+')'; x.lineWidth=DPR*(near?1:0.6); x.beginPath(); x.moveTo(sc[0],sc[1]); x.lineTo(np[0],np[1]); x.stroke(); }
        // sun
        var sr=DPR*(near?7:4); var gg=x.createRadialGradient(sc[0],sc[1],0,sc[0],sc[1],sr*5); gg.addColorStop(0,'rgba(150,190,250,'+(near?.6:.3)+')'); gg.addColorStop(1,'rgba(90,140,216,0)'); x.fillStyle=gg; x.beginPath(); x.arc(sc[0],sc[1],sr*5,0,6.283); x.fill();
        x.beginPath(); x.fillStyle='#dbe8ff'; x.arc(sc[0],sc[1],sr,0,6.283); x.fill();
        // nodes
        for(var k=0;k<sy.nodes.length;k++){ var nd=sy.nodes[k], np=proj(nd.x,nd.y);
          var isActive=(near && STEPS[activeStep] && STEPS[activeStep].t===nd.t);
          var rr=DPR*(isActive?6.5:3.4);
          var g2=x.createRadialGradient(np[0],np[1],0,np[0],np[1],rr*(isActive?6:3.2)); g2.addColorStop(0,'rgba(120,170,240,'+(isActive?.6:.26)+')'); g2.addColorStop(1,'rgba(90,140,216,0)'); x.fillStyle=g2; x.beginPath(); x.arc(np[0],np[1],rr*(isActive?6:3.2),0,6.283); x.fill();
          x.beginPath(); x.fillStyle='rgba(210,228,255,'+(isActive?1:.8)+')'; x.arc(np[0],np[1],rr,0,6.283); x.fill();
          if(isActive){ var pr=rr+DPR*(8+5*Math.sin(t*3)); x.strokeStyle='rgba(150,190,245,.75)'; x.lineWidth=DPR*1.2; x.beginPath(); x.arc(np[0],np[1],pr,0,6.283); x.stroke(); activeWorld=np;
            x.font=(11*DPR)+'px Inter,sans-serif'; }
          else if(near){ x.font=(11*DPR)+'px Inter,sans-serif'; x.fillStyle='rgba(180,200,228,.6)'; x.textAlign='center'; x.fillText(nd.t,np[0],np[1]+rr+14*DPR); }
        }
      }
      // popup + connector + sysHud opacity
      var prox=Math.abs(sf-Math.round(sf)), op=Math.max(0,Math.min(1-prox*2.3,1));
      sysHud.style.opacity=op*0.96;
      if(activeWorld && op>0.05){
        var nx=activeWorld[0]/DPR, ny=activeWorld[1]/DPR, pw=pop.offsetWidth||300, ph=pop.offsetHeight||130;
        var right=nx<cssW*0.56, px2=right?nx+44:nx-pw-44; px2=Math.max(14,Math.min(px2,cssW-pw-14));
        var py2=Math.max(150,Math.min(ny-ph/2,cssH-ph-16));
        pop.style.left=px2+'px'; pop.style.top=py2+'px'; pop.style.opacity=op;
        var ax=(right?px2:px2+pw), ay=py2+26;
        x.strokeStyle='rgba(90,140,216,'+(0.85*op)+')'; x.lineWidth=DPR*1.1; x.beginPath(); x.moveTo(activeWorld[0],activeWorld[1]); x.lineTo(ax*DPR,ay*DPR); x.stroke();
        x.beginPath(); x.fillStyle='rgba(156,192,255,'+op+')'; x.arc(ax*DPR,ay*DPR,DPR*2.4,0,6.283); x.fill();
      } else pop.style.opacity=0;

      requestAnimationFrame(frame);
    }
    setSys(0); setPopup(0); onScroll(); requestAnimationFrame(frame);
  })();
</script>

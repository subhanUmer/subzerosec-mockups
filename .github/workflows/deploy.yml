name: Deploy site

# Builds the Astro app in /site (output lands in /stack) and publishes the whole
# repo root — the mockup gallery, the ~25 sibling design variants, and the freshly
# built final site at /stack — as one GitHub Pages artifact. Sibling mockups are
# copied verbatim, so only /stack changes between deploys.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: site
      - name: Build both variants (../stack and ../stack-pro)
        run: npm run build:all
        working-directory: site
      - name: Stage Pages artifact (gallery + siblings + built /stack)
        run: |
          mkdir -p _site
          rsync -a --exclude='_site' --exclude='site' --exclude='.git' --exclude='.github' --exclude='node_modules' ./ _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
